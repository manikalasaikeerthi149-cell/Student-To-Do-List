<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📚 Student To-Do List</h1>

    <div class="top-bar">
        <input type="text" id="taskInput" placeholder="Enter Task">

        <select id="priority">
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
        </select>

        <input type="date" id="dueDate">

        <button onclick="addTask()">Add</button>
    </div>

    <div class="search-box">
        <input type="text" id="search" placeholder="Search Task..." onkeyup="searchTask()">
    </div>

    <div class="stats">
        <span>Total: <b id="total">0</b></span>
        <span>Completed: <b id="completed">0</b></span>
        <span>Pending: <b id="pending">0</b></span>
    </div>

    <ul id="taskList"></ul>

    <div class="buttons">
        <button onclick="clearTasks()">Clear All</button>
        <button onclick="toggleTheme()">🌙 Dark Mode</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
